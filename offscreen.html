<!doctype html>
<!--
  offscreen.html — root host for the Publisher's headless render target.

  Second Vite multi-page entry. `vite build` emits this to dist/offscreen.html,
  which publisher-renderer/render.mjs loads over file://. NOT the app shell
  (that is index.html). See src/publisher/offscreen.tsx for the data-injection
  contract and the exact rollupOptions.input entry the Integration agent must add
  to vite.config.ts.
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, initial-scale=1.0" />
    <title>Coruro Publisher — Offscreen Render</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
      }
    </style>
  </head>
  <body>
    <div id="offscreen-root"></div>
    <script type="module" src="/src/publisher/offscreen.tsx"></script>
  </body>
</html>
